<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ManuscriptPrep Ingest Results</title>
    <link rel="stylesheet" href="/ui/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">ManuscriptPrep</p>
          <h1 id="ingest-results-title">Ingest Results</h1>
          <p id="ingest-results-status" class="lede">Loading classification, extract, clean, and chunking results.</p>
        </div>
      </section>

      <section id="ingest-results-summary" class="grid three"></section>

      <section class="panel">
        <div class="panel-head">
          <h2>Downloads</h2>
        </div>
        <div class="panel-actions wrap">
          <button type="button" id="download-raw-text" class="secondary-button">Download Raw Text</button>
          <button type="button" id="download-clean-text" class="secondary-button">Download Clean Text</button>
          <button type="button" id="download-chunk-manifest" class="secondary-button">Download Chunk Manifest</button>
          <button type="button" id="download-ingest-manifest" class="secondary-button">Download Ingest Manifest</button>
        </div>
      </section>

      <section class="grid two">
        <article class="panel">
          <div class="panel-head">
            <h2>Classification</h2>
          </div>
          <pre id="ingest-classification">Loading...</pre>
        </article>
        <article class="panel">
          <div class="panel-head">
            <h2>Chunking Summary</h2>
          </div>
          <pre id="ingest-chunking">Loading...</pre>
        </article>
      </section>

      <section class="grid two">
        <article class="panel">
          <div class="panel-head">
            <h2>Extraction Metadata</h2>
          </div>
          <pre id="ingest-extract">Loading...</pre>
        </article>
        <article class="panel">
          <div class="panel-head">
            <h2>Cleaning Metadata</h2>
          </div>
          <pre id="ingest-clean">Loading...</pre>
        </article>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Chunk Index</h2>
        </div>
        <pre id="ingest-chunk-list">Loading...</pre>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Raw Text</h2>
        </div>
        <pre id="ingest-raw-text">Loading...</pre>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Clean Text</h2>
        </div>
        <pre id="ingest-clean-text">Loading...</pre>
      </section>
    </main>

    <script src="/ui/ingest-results.js"></script>
  </body>
</html>
